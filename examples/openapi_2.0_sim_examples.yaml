swagger: "2.0"
info:
  title: Simulação de Examples (2.0 → 3.0)
  description: |
    Arquivo de simulação para testar o comportamento do migrator
    com diferentes formas de 'example' disponíveis no OpenAPI 2.0.

    Cenários testados:
      A) example inline em propriedade de schema (já existia no 2.0)
      B) example no nível do schema (object-level)
      C) example inline em parâmetro
      D) example inline em resposta (campo 'examples' do 2.0)
      E) x-examples (extensão customizada — simulação de named examples)
  version: "1.0.0"

host: api.exemplo.com
basePath: /v1
schemes:
  - https

produces:
  - application/json

paths:

  /pedidos/{pedidoId}:
    get:
      summary: Buscar pedido
      operationId: buscarPedido
      parameters:

        # ── Cenário C: example inline em parâmetro ──────────────────────────
        - name: pedidoId
          in: path
          required: true
          type: integer
          format: int64
          description: ID do pedido
          example: 1001              # ← 'example' direto no parâmetro (2.0)

      responses:
        200:
          description: Pedido encontrado

          # ── Cenário D: 'examples' no nível da resposta (2.0) ─────────────
          # Em 2.0 a chave 'examples' fica dentro da resposta, por mime type:
          examples:
            application/json:
              id: 1001
              status: pendente
              clienteId: 42
              total: 204.90

          schema:
            $ref: '#/definitions/Pedido'

  /pedidos:
    post:
      summary: Criar pedido
      operationId: criarPedido
      consumes:
        - application/json
      parameters:
        - name: body
          in: body
          required: true

          # ── Cenário E: x-examples (extensão — simula named examples) ─────
          # Não é padrão 2.0, mas ferramentas como Stoplight usam esta convenção
          x-examples:
            PedidoMinimo:
              summary: Pedido mínimo
              value:
                clienteId: 42
                itens:
                  - produtoId: 555
                    quantidade: 1
            PedidoCompleto:
              summary: Pedido com todos os campos
              value:
                clienteId: 42
                itens:
                  - produtoId: 555
                    quantidade: 2
                cupomDesconto: PROMO10
                observacoes: Entregar no período da tarde

          schema:
            $ref: '#/definitions/PedidoCriacao'

      responses:
        201:
          description: Pedido criado
          schema:
            $ref: '#/definitions/Pedido'

definitions:

  # ── Cenário A: example inline em propriedade ─────────────────────────────
  # Já é padrão 2.0 — aqui vemos também example em objeto (não apenas scalar)
  Pedido:
    type: object
    required:
      - id
      - status
      - clienteId
      - total
    properties:
      id:
        type: integer
        format: int64
        example: 1001              # ← example scalar em propriedade
      status:
        type: string
        enum: [pendente, processando, enviado, entregue, cancelado]
        example: pendente
      clienteId:
        type: integer
        format: int64
        example: 42
      total:
        type: number
        format: double
        example: 204.90
      metadata:
        type: object
        additionalProperties:
          type: string
        example:                    # ← example como objeto (não scalar)
          origem: app-mobile
          campanha: black-friday

    # ── Cenário B: example no nível do schema (object-level) ─────────────
    # Em 2.0 o 'example' pode ficar no nível raiz do schema (não apenas em propriedades)
    example:
      id: 1001
      status: pendente
      clienteId: 42
      total: 204.90
      metadata:
        origem: app-mobile
        campanha: black-friday

  PedidoCriacao:
    type: object
    required:
      - clienteId
      - itens
    properties:
      clienteId:
        type: integer
        format: int64
        example: 42
      itens:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - produtoId
            - quantidade
          properties:
            produtoId:
              type: integer
              format: int64
              example: 555
            quantidade:
              type: integer
              minimum: 1
              example: 2
      cupomDesconto:
        type: string
        pattern: "^[A-Z0-9]{6,12}$"
        example: PROMO10
      observacoes:
        type: string
        maxLength: 500
